<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#0a0a14" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Chromafall</title>
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <link rel="apple-touch-icon" href="/icons/icon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #0a0a14;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", monospace;
        /* Disable iOS pinch-zoom and rubber-band scroll over the game */
        touch-action: none;
        overscroll-behavior: none;
        -webkit-tap-highlight-color: transparent;
        -webkit-user-select: none;
        user-select: none;
      }
      body {
        /* 100dvh tracks the dynamic viewport (accounts for iOS URL bar
           collapsing). 100vh is the fallback for older browsers. */
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        /* Safe-area padding keeps the board out from under the iOS notch /
           home indicator and the Android nav bar. Phaser's scale manager
           sizes the canvas to #game, which is inside this padding. */
        padding-top: env(safe-area-inset-top);
        padding-right: env(safe-area-inset-right);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        box-sizing: border-box;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #game {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
